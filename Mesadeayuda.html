<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Ayuda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="hero-banner">
        <div class="container">
            <div class="logo-section">
                <i class="fas fa-ghost logo-icon"></i>
                <div>
                    <h1>Mesa de Ayuda</h1>
                    <p>Tu soporte siempre disponible</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <p class="intro-text">
            Sería una sección dentro de la plataforma donde se encontrarán preguntas frecuentes, accesos a activación de correo, etc.
        </p>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="¿En qué te podemos ayudar hoy? Escribe tu duda...">
                <button onclick="searchFunction()"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="main-grid">
            <section class="faq-section">
                <h2><i class="fas fa-question-circle red-icon"></i> Preguntas Frecuentes</h2>
                <div class="accordion">
                    <div class="accordion-item">
                        <button class="accordion-header">
                            <span><i class="fas fa-briefcase"></i> Esenciales del negocio</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    <div class="accordion-item">
                        <button class="accordion-header">
                            <span><i class="fas fa-user-tie"></i> Esenciales del usuario</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    <div class="accordion-item">
                        <button class="accordion-header">
                            <span><i class="fas fa-building"></i> Esenciales de la organización</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    </div>
            </section>

            <section class="self-management">
                <h2><i class="fas fa-cog"></i> Autogestión</h2>
                <div class="action-list">
                    <button class="action-item" onclick="showModal('Reiniciar mi clave de Corebank')">
                        <i class="fas fa-key gold-icon"></i>
                        <span>Reiniciar mi clave de Corebank</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <button class="action-item" onclick="showModal('Recuperar mi correo electrónico')">
                        <i class="fas fa-envelope red-icon"></i>
                        <span>Recuperar mi correo electrónico</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <button class="action-item" onclick="showModal('Simuladores de Créditos')">
                        <i class="fas fa-calculator blue-icon"></i>
                        <span>Simuladores de Créditos</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <button class="btn-call" onclick="showCallModal()">
                    <i class="fas fa-phone-alt"></i> Llamar a Mesa de Ayuda
                </button>
            </section>
        </div>
    </main>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h3>¡Solicitud iniciada!</h3>
            <p id="modal-text">Estamos procesando...</p>
            <button class="btn-close" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
