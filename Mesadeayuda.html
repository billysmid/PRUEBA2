<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Ayuda - Soporte</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/Mesadeayuda.css">
</head>
<body>
    <div class="root-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo_web.png" alt="Logo" class="sidebar-logo-img">
            </div>
            <ul class="sidebar-menu">
                <li class="menu-item"><a href="dashboard.html">Inicio</a></li>
                <li class="menu-item active"><a href="#">Mesa de ayuda</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <nav class="top-nav">
                <ul class="nav-links">
                    <li><a href="#">DASHBOARD</a></li>
                    <li><a href="#">BENEFICIOS</a></li>
                </ul>
                <div class="header-profile">
                    <span class="profile-name">Niurka Obregon</span>
                    <div class="profile-avatar" style="background:#00c1ff; color:white; padding:10px; border-radius:50%; margin-left:10px; font-weight:bold;">NO</div>
                </div>
            </nav>

            <div class="content-body">
                <h1 style="text-align:center; font-size: 2.5rem; margin-bottom: 40px;">Mesa de Ayuda</h1>

                <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                    <div>
                        <h2 style="margin-bottom:20px;"><i class="fas fa-question-circle" style="color:#ff4b4b"></i> Preguntas Frecuentes</h2>
                        <div class="accordion-item" onclick="toggleAccordion(this)" style="border:2px solid #e5e5e5; border-radius:15px; padding:20px; cursor:pointer; margin-bottom:10px;">
                            <div style="display:flex; justify-content:space-between; font-weight:bold;">
                                <span>Esenciales del negocio</span>
                                <i class="fas fa-chevron-down"></i>
                            </div>
                            <div class="acc-content" style="display:none; margin-top:15px; color:#666;">
                                Guías sobre Corebank y procesos internos.
                            </div>
                        </div>
                    </div>

                    <div>
                        <h2 style="margin-bottom:20px;"><i class="fas fa-cog"></i> Autogestión</h2>
                        
                        <div class="card-item" onclick="abrirModal('Reiniciar clave de Corebank')" style="border:2px solid #e5e5e5; border-radius:15px; padding:20px; cursor:pointer; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                            <span><i class="fas fa-key" style="color:#f1c40f"></i> Reiniciar clave de Corebank</span>
                            <i class="fas fa-arrow-right" style="color:#1cb0f6"></i>
                        </div>

                        <div class="card-item" onclick="abrirModal('Recuperar correo electrónico')" style="border:2px solid #e5e5e5; border-radius:15px; padding:20px; cursor:pointer; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                            <span><i class="fas fa-envelope" style="color:#ff4b4b"></i> Recuperar correo electrónico</span>
                            <i class="fas fa-arrow-right" style="color:#1cb0f6"></i>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="miModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:9999;">
        <div style="background:white; padding:40px; border-radius:25px; text-align:center; width:350px;">
            <div style="background:#27ae60; color:white; width:60px; height:60px; border-radius:15px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:25px;"><i class="fas fa-check"></i></div>
            <h2 style="margin-bottom:10px;">¡Iniciado!</h2>
            <p id="modal-text">Procesando solicitud...</p>
            <button onclick="cerrarModal()" style="margin-top:20px; background:#1cb0f6; color:white; border:none; padding:10px 30px; border-radius:12px; font-weight:bold; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script>
        // Función para los acordeones
        function toggleAccordion(el) {
            const content = el.querySelector('.acc-content');
            const icon = el.querySelector('.fa-chevron-down');
            if (content.style.display === "block") {
                content.style.display = "none";
                icon.style.transform = "rotate(0deg)";
            } else {
                content.style.display = "block";
                icon.style.transform = "rotate(180deg)";
            }
        }

        // FUNCIÓN CORREGIDA (Sin errores de sintaxis)
        function abrirModal(tipo) {
            const modal = document.getElementById('miModal');
            const text = document.getElementById('modal-text');
            
            // Usamos comillas normales para evitar el SyntaxError
            text.innerHTML = "Estamos procesando: <strong>" + tipo + "</strong>";
            
            modal.style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('miModal').style.display = 'none';
        }

        // Cerrar al hacer clic fuera del cuadro blanco
        window.onclick = function(event) {
            const modal = document.getElementById('miModal');
            if (event.target == modal) {
                cerrarModal();
            }
        }
    </script>
</body>
</html>
