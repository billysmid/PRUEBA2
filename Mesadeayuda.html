            margin: 0;
            background-color: #f8f9fa;
            color: #333;

        .hero {

        .hero h1 { margin: 0; font-size: 2.6rem; }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        .text-intro { color: #777; text-align: center; margin-bottom: 50px; font-size: 1.05rem; }

        .search-bar { position: relative; max-width: 650px; margin: 0 auto 60px; }

        .search-bar input {
            width: 100%; padding: 18px 25px 18px 55px; border-radius: 50px;
            border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.1);

        }

        .search-bar i {
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
            color: #4481eb;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }

        .section-title { display: flex; align-items: center; gap: 12px; font-size: 1.6rem; margin-bottom: 25px; color: #2c3e50; }

        }

            text-align: left; display: flex; justify-content: space-between;
            align-items: center; font-size: 1.05rem; cursor: pointer;
        }

        .accordion-header:hover { background: #f8f9fa; }

        .accordion-content {

            background: #f9fafc; padding: 0 25px;
        }

        .accordion-item.active .accordion-content {
            max-height: 500px; padding: 20px 25px;
        }

        .accordion-header i.fa-chevron-down { transition: transform 0.4s ease; }

        .accordion-item.active .accordion-header i.fa-chevron-down {
            transform: rotate(180deg);
        }

            display: flex; align-items: center; justify-content: space-between;

        .card-item:hover { border-color: #4481eb; background: #f9fbff; }

        }

        }
